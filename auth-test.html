<!DOCTYPE html>
<html>
<head>
    <title>Auth Test</title>
</head>
<body>
    <h2>Teacher Auth Endpoints Test</h2>
    <button onclick="testEndpoint('/api/teacher-auth/me')">Test /api/teacher-auth/me</button>
    <button onclick="testEndpoint('/api/teacher-auth/profile')">Test /api/teacher-auth/profile</button>
    <button onclick="testEndpoint('/api/teachers')">Test /api/teachers</button>
    <hr>
    <pre id="output"></pre>
    <script>
        async function testEndpoint(ep){
            const out = document.getElementById('output');
            out.textContent = `Testing ${ep}...\n`;
            try{
                const res = await fetch(ep, {cache:'no-store'});
                out.textContent += `Status: ${res.status}\n`;
                const body = await res.json();
                out.textContent += JSON.stringify(body, null, 2);
            }catch(e){
                out.textContent += `Error: ${e.message}`;
            }
        }
    </script>
</body>
</html>
