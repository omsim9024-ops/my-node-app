<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test Register Form</title>
</head>
<body>
  <h2>Test Register Form</h2>
  <form action="/api/auth/register" method="post">
    <label>First name: <input name="firstName" value="Test"></label><br>
    <label>Last name: <input name="lastName" value="User"></label><br>
    <label>Email: <input name="email" value="test.browser@example.com"></label><br>
    <label>Password: <input name="password" value="password123"></label><br>
    <label>Grade Level: <input name="gradeLevel" value="10"></label><br>
    <button type="submit">Submit</button>
  </form>
  <p>Open this page from the server at <a href="/test-register-form.html">/test-register-form.html</a>.</p>
</body>
</html>
