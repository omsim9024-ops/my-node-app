<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Teacher Signup – CNHS</title>

    <link rel="icon" href="cnhs_logo.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="admin-login.css" />
  </head>

  <body>
    <script>
      // redirect to unified auth page with teacher role
      (function(){
        try {
          const params = new URLSearchParams(window.location.search || '');
          const school = params.get('school') || params.get('tenant') || params.get('code') || '';
          let target = 'auth.html?role=adviser';
          if (school) {
            target += '&school=' + encodeURIComponent(school);
          }
          window.location.replace(target);
        } catch(e) {}
      })();
    </script>
    <div class="login-wrapper">
      <div class="login-card">
        <div class="brand">
          <img src="cnhs_logo.png" alt="Logo" class="school-logo" />
          <h1>Teacher Signup</h1>
          <p>Create your teacher account</p>
        </div>

        <form id="signupForm">
          <div class="input-group">
            <i class="fa-solid fa-key"></i>
            <input type="text" id="registrationCode" placeholder="Registration Code (required)" required />
          </div>

          <div class="input-group">
            <i class="fa-solid fa-id-badge"></i>
            <input type="text" id="teacherId" placeholder="Teacher ID (e.g. TCH001)" />
          </div>

          <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="teacherName" placeholder="Full name" required />
          </div>

          <div class="input-group">
            <i class="fa-solid fa-building-user"></i>
            <input type="text" id="department" placeholder="Department" required />
          </div>

          <div class="input-group">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="signupEmail" placeholder="Email address" required />
          </div>

          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="signupPassword" placeholder="Password (min 8 chars)" required />
          </div>

          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="signupConfirm" placeholder="Confirm password" required />
          </div>

          <button class="btn-login" type="submit">Create Account</button>
        </form>

        <div class="signup">
          Already have an account?
          <a href="teacher-login.html">Sign in</a>
        </div>
      </div>
    </div>

    <script src="teacher-signup.js"></script>
  </body>
</html>
