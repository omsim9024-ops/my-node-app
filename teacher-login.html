<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Teacher Login</title>

    <link rel="icon" href="cnhs_logo.png" type="image/png" id="schoolFavicon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="admin-login.css" />
  </head>

  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <div class="brand">
          <img src="cnhs_logo.png" alt="School Logo" class="school-logo" id="schoolLogo" />
          <h1 id="schoolName">Teacher Login</h1>
          <p>Sign in to your teacher account</p>
        </div>

        <form id="loginForm">
          <div class="input-group">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="Email address" required />
          </div>

          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="Password" required />
          </div>

          <button class="btn-login" type="submit">Sign in</button>
        </form>

        <div class="signup">
          Don't have an account?
          <a href="teacher-signup.html" id="signupLink">Create one</a>
        </div>
      </div>
    </div>

    <!-- ✅ Tab-Scoped Session Manager - Prevents multi-tab session conflicts -->
    <script src="session-manager.js"></script>
    <script src="teacher-login.js"></script>
  </body>
</html>
