version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: enrollments_db
    volumes:
      - ./enrollments.sql:/docker-entrypoint-initdb.d/enrollments.sql:ro
    ports:
      - "3306:3306"

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: pg_user
      POSTGRES_PASSWORD: pgpass
      POSTGRES_DB: "compostela-sms"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pg_user -d compostela-sms"]
      interval: 5s
      retries: 10

  pgloader:
    image: dimitri/pgloader:latest
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./:/work
    working_dir: /work
    entrypoint: ["/bin/sh","-c"]
    command: ["pgloader my_migration.load"]
